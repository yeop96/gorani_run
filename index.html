<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>고라니 런 - GORANI RUN</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{overflow:hidden;background:#0a0a0a;touch-action:none;-webkit-user-select:none;user-select:none;}
  canvas{display:block;width:100vw;height:100vh;}
  #score-display{position:fixed;top:20px;left:50%;transform:translateX(-50%);color:#fff;font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700;z-index:20;text-shadow:0 0 20px rgba(255,200,50,0.8),0 0 40px rgba(255,150,0,0.4);letter-spacing:3px;}
  #distance-display{position:fixed;bottom:30px;right:20px;color:#88ff88;font-family:'Orbitron',sans-serif;font-size:13px;z-index:20;text-shadow:0 0 15px rgba(100,255,100,0.6);letter-spacing:2px;}
  #combo-display{position:fixed;top:55px;left:50%;transform:translateX(-50%);color:#ffdd44;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;z-index:20;text-shadow:0 0 15px rgba(255,220,50,0.6);opacity:0;transition:opacity 0.3s;}
  #lives-display{position:fixed;top:20px;left:20px;z-index:20;display:flex;gap:4px;align-items:center;}
  .life-icon{transition:all 0.3s;width:28px;height:28px;}.life-icon.lost{opacity:0.15;filter:grayscale(1);}
  #flash-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,60,60,0.35);z-index:15;opacity:0;pointer-events:none;transition:opacity 0.15s;}
  #warning-text{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);font-family:'Noto Sans KR',sans-serif;font-size:20px;font-weight:900;color:#ff4444;text-shadow:0 0 30px rgba(255,50,50,0.8);z-index:25;opacity:0;pointer-events:none;transition:opacity 0.3s;}
  #start-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,#0d1a0d 0%,#1a2a10 40%,#0a1508 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;pointer-events:all;}
  .gorani-emoji{margin-bottom:15px;animation:bounce 1.5s ease-in-out infinite;width:120px;height:120px;}
  @keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
  #start-screen h1{font-family:'Noto Sans KR',sans-serif;font-size:36px;font-weight:900;color:#fff;text-shadow:0 0 30px rgba(255,200,50,0.7),0 0 60px rgba(255,150,0,0.3);letter-spacing:4px;margin-bottom:5px;}
  #start-screen .subtitle{font-family:'Orbitron',sans-serif;font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:5px;margin-bottom:8px;}
  .flavor-text{font-family:'Noto Sans KR',sans-serif;font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:35px;}
  .best-score-display{font-family:'Orbitron',sans-serif;font-size:13px;color:rgba(255,200,0,0.65);letter-spacing:3px;margin-bottom:35px;}
  #start-btn{font-family:'Noto Sans KR',sans-serif;font-size:17px;font-weight:900;color:#fff;background:linear-gradient(135deg,rgba(80,180,50,0.25),rgba(50,130,30,0.35));border:2px solid rgba(100,200,60,0.5);padding:18px 55px;border-radius:50px;cursor:pointer;letter-spacing:5px;pointer-events:all;-webkit-tap-highlight-color:transparent;}
  #start-btn:active{background:linear-gradient(135deg,rgba(80,180,50,0.45),rgba(50,130,30,0.55));transform:scale(0.96);}
  .gyro-hint{font-family:'Noto Sans KR',sans-serif;font-size:11px;color:rgba(255,255,255,0.25);margin-top:25px;}
  #game-over-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,5,5,0.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;pointer-events:all;backdrop-filter:blur(8px);}
  #game-over-screen .dead-gorani{margin-bottom:15px;width:96px;height:96px;}
  #game-over-screen h2{font-family:'Noto Sans KR',sans-serif;font-size:24px;font-weight:900;color:#ff5555;text-shadow:0 0 25px rgba(255,50,50,0.5);letter-spacing:4px;margin-bottom:25px;}
  #final-score{font-family:'Orbitron',sans-serif;font-size:44px;font-weight:900;color:#fff;margin-bottom:8px;}
  #final-distance{font-family:'Orbitron',sans-serif;font-size:14px;color:rgba(255,255,255,0.4);letter-spacing:2px;margin-bottom:25px;}
  #new-best{font-family:'Noto Sans KR',sans-serif;font-size:15px;color:#ffcc00;letter-spacing:3px;margin-bottom:25px;display:none;animation:pulse 0.8s ease-in-out infinite;}
  #new-best canvas{width:24px;height:24px;vertical-align:middle;margin-right:4px;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
  #restart-btn{font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:900;color:#fff;background:linear-gradient(135deg,rgba(255,80,50,0.2),rgba(255,50,30,0.3));border:2px solid rgba(255,80,50,0.5);padding:16px 35px;border-radius:50px;cursor:pointer;letter-spacing:4px;pointer-events:all;-webkit-tap-highlight-color:transparent;}
  .gameover-buttons{display:flex;gap:12px;margin-top:5px;}
  #share-btn{font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:900;color:#fff;background:linear-gradient(135deg,rgba(50,120,255,0.2),rgba(30,80,220,0.3));border:2px solid rgba(80,140,255,0.5);padding:16px 35px;border-radius:50px;cursor:pointer;letter-spacing:4px;pointer-events:all;-webkit-tap-highlight-color:transparent;}
  #share-btn:active{transform:scale(0.96);}
  #share-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(50,50,50,0.95);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:13px;padding:10px 24px;border-radius:20px;z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none;}
  #ad-space{position:fixed;bottom:0;left:0;width:100%;height:50px;background:rgba(0,0,0,0.85);border-top:1px solid rgba(255,255,255,0.08);display:none;align-items:center;justify-content:center;z-index:50;font-family:'Orbitron',sans-serif;font-size:9px;color:rgba(255,255,255,0.2);letter-spacing:3px;}
  #sound-btn{position:fixed;top:20px;right:20px;z-index:30;width:38px;height:38px;border-radius:50%;border:2px solid rgba(255,255,255,0.25);background:rgba(0,0,0,0.4);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;pointer-events:all;-webkit-tap-highlight-color:transparent;backdrop-filter:blur(4px);transition:all 0.2s;padding:0;}
  #sound-btn canvas{width:22px;height:22px;}
  #sound-btn:active{transform:scale(0.9);}
  #sound-btn.muted{opacity:0.4;}
  #fever-bar-container{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);width:160px;height:12px;background:rgba(0,0,0,0.5);border-radius:6px;border:1px solid rgba(255,200,0,0.3);z-index:20;overflow:hidden;opacity:0;transition:opacity 0.3s;}
  #fever-bar{width:0%;height:100%;background:linear-gradient(90deg,#ff8800,#ffcc00,#ff8800);border-radius:6px;transition:width 0.3s;}
  #fever-text{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Noto Sans KR',sans-serif;font-size:42px;font-weight:900;color:#ffdd00;text-shadow:0 0 40px rgba(255,200,0,0.9),0 0 80px rgba(255,100,0,0.5);z-index:25;opacity:0;pointer-events:none;letter-spacing:6px;}
  #fever-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:14;pointer-events:none;opacity:0;transition:opacity 0.3s;background:radial-gradient(circle,transparent 40%,rgba(255,150,0,0.12) 100%);border:3px solid rgba(255,200,0,0.0);}
  #fever-overlay.active{opacity:1;border-color:rgba(255,200,0,0.4);animation:feverPulse 0.5s ease-in-out infinite;}
  @keyframes feverPulse{0%,100%{border-color:rgba(255,200,0,0.4);box-shadow:inset 0 0 30px rgba(255,150,0,0.1);}50%{border-color:rgba(255,100,0,0.6);box-shadow:inset 0 0 60px rgba(255,150,0,0.15);}}
  #powerup-display{position:fixed;top:52px;left:20px;z-index:20;display:flex;gap:6px;flex-direction:column;}
  .powerup-indicator{font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:700;color:#fff;padding:3px 10px;border-radius:12px;opacity:0;transition:opacity 0.3s;white-space:nowrap;}
  .powerup-indicator.shield{background:rgba(50,150,255,0.6);border:1px solid rgba(100,180,255,0.8);}
  .powerup-indicator.magnet{background:rgba(220,50,220,0.6);border:1px solid rgba(255,100,255,0.8);}
  .powerup-indicator.slow{background:rgba(50,200,150,0.6);border:1px solid rgba(100,255,200,0.8);}
  /* ─── SKIN SHOP ─── */
  #skin-btn{font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;color:#ffdd88;background:rgba(255,200,50,0.12);border:1px solid rgba(255,200,50,0.35);padding:10px 28px;border-radius:30px;cursor:pointer;letter-spacing:3px;margin-top:12px;-webkit-tap-highlight-color:transparent;}
  #skin-btn:active{transform:scale(0.96);}
  #coin-display{font-family:'Orbitron',sans-serif;font-size:12px;color:#ffdd00;letter-spacing:2px;margin-top:8px;}
  #skin-shop{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,10,5,0.96);z-index:150;display:none;flex-direction:column;align-items:center;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:30px 15px 60px;backdrop-filter:blur(6px);}
  #skin-shop h2{font-family:'Noto Sans KR',sans-serif;font-size:24px;font-weight:900;color:#fff;letter-spacing:4px;margin-bottom:5px;}
  #skin-shop .shop-coins{font-family:'Orbitron',sans-serif;font-size:14px;color:#ffdd00;letter-spacing:2px;margin-bottom:20px;}
  .skin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:360px;}
  .skin-card{background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.1);border-radius:14px;padding:12px 6px 10px;display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:all 0.2s;-webkit-tap-highlight-color:transparent;}
  .skin-card:active{transform:scale(0.95);}
  .skin-card.selected{border-color:rgba(100,255,100,0.7);background:rgba(100,255,100,0.08);box-shadow:0 0 15px rgba(100,255,100,0.15);}
  .skin-card.locked{opacity:0.5;}
  .skin-card .skin-preview{width:64px;height:64px;margin-bottom:6px;}
  .skin-card .skin-name{font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:700;color:#fff;margin-bottom:3px;}
  .skin-card .skin-cost{font-family:'Orbitron',sans-serif;font-size:9px;color:#ffdd00;letter-spacing:1px;}
  .skin-card .skin-cost.achievement{color:#88ff88;}
  .skin-card .skin-cost.owned{color:#88aaff;}
  #shop-close-btn{font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:900;color:#fff;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.2);padding:14px 40px;border-radius:50px;cursor:pointer;letter-spacing:4px;margin-top:20px;}
  #shop-equip-btn{font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:900;color:#fff;background:linear-gradient(135deg,rgba(80,180,50,0.25),rgba(50,130,30,0.35));border:2px solid rgba(100,200,60,0.5);padding:14px 40px;border-radius:50px;cursor:pointer;letter-spacing:4px;margin-top:12px;}
  .shop-section-title{font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;color:rgba(255,255,255,0.5);letter-spacing:2px;margin:15px 0 8px;width:100%;max-width:360px;}
  .skin-card .unlock-info{font-family:'Noto Sans KR',sans-serif;font-size:8px;color:rgba(255,255,255,0.4);text-align:center;margin-top:2px;}
</style>
</head>
<body>
<div id="score-display">0</div>
<div id="combo-display">아슬아슬! x1</div>
<div id="distance-display">0 m</div>
<div id="lives-display">
  <canvas class="life-icon" id="life1" width="88" height="88"></canvas>
  <canvas class="life-icon" id="life2" width="88" height="88"></canvas>
  <canvas class="life-icon" id="life3" width="88" height="88"></canvas>
</div>
<div id="flash-overlay"></div>
<div id="warning-text">위험해!</div>
<button id="sound-btn" aria-label="Sound"><canvas id="sound-canvas" width="36" height="36"></canvas></button>
<div id="start-screen">
  <canvas class="gorani-emoji" id="title-gorani" width="256" height="256"></canvas>
  <h1>고라니 런</h1>
  <div class="subtitle">GORANI RUN</div>
  <div class="flavor-text">도로를 건너는 고라니를 도와주세요!</div>
  <div class="best-score-display" id="best-score-text">BEST: 0</div>
  <button id="start-btn">달리기</button>
  <button id="skin-btn">스킨샵</button>
  <div id="coin-display">COIN: 0</div>
  <div class="gyro-hint">핸드폰을 기울여서 조작 · 더블탭으로 점프!</div>
</div>
<div id="skin-shop">
  <h2>스킨샵</h2>
  <div class="shop-coins" id="shop-coins">COIN: 0</div>
  <div class="shop-section-title">악세서리</div>
  <div class="skin-grid" id="skin-grid"></div>
  <button id="shop-equip-btn">장착하기</button>
  <button id="shop-close-btn">닫기</button>
</div>
<div id="game-over-screen">
  <canvas class="dead-gorani" id="dead-gorani-canvas" width="200" height="200"></canvas>
  <h2>로드킬 당했다!</h2>
  <div id="final-score">0</div>
  <div id="final-distance">0 m 생존</div>
  <div id="new-best"><canvas id="trophy-canvas" width="32" height="32" style="vertical-align:middle;margin-right:4px"></canvas>신기록!</div>
  <div class="gameover-buttons">
    <button id="restart-btn">다시 달리기</button>
    <button id="share-btn">점수 공유</button>
  </div>
</div>
<div id="fever-bar-container"><div id="fever-bar"></div></div>
<div id="fever-text"></div>
<div id="fever-overlay"></div>
<div id="powerup-display">
  <div class="powerup-indicator shield" id="pu-shield">🛡️ 실드</div>
  <div class="powerup-indicator magnet" id="pu-magnet">🧲 자석</div>
  <div class="powerup-indicator slow" id="pu-slow">🐌 슬로우</div>
</div>
<div id="boss-warning" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Noto Sans KR',sans-serif;font-size:32px;font-weight:900;color:#ff4444;text-shadow:0 0 40px rgba(255,50,50,0.9),0 0 80px rgba(255,0,0,0.5);z-index:25;opacity:0;pointer-events:none;letter-spacing:6px;">⚠️ 보스 트럭 접근 ⚠️</div>
<div id="boss-hp-container" style="position:fixed;top:85px;left:50%;transform:translateX(-50%);width:200px;height:14px;background:rgba(0,0,0,0.6);border-radius:7px;border:1px solid rgba(255,50,50,0.5);z-index:20;overflow:hidden;opacity:0;transition:opacity 0.3s;">
  <div id="boss-hp-bar" style="width:100%;height:100%;background:linear-gradient(90deg,#ff2200,#ff6644);border-radius:7px;transition:width 0.3s;"></div>
</div>
<div id="boss-hp-label" style="position:fixed;top:70px;left:50%;transform:translateX(-50%);font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:700;color:#ff6644;z-index:20;opacity:0;letter-spacing:2px;">BOSS</div>
<div id="env-name" style="position:fixed;bottom:50px;left:50%;transform:translateX(-50%);font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;color:rgba(255,255,255,0.6);z-index:20;opacity:0;transition:opacity 0.5s;pointer-events:none;letter-spacing:3px;text-shadow:0 0 15px rgba(255,255,255,0.3);"></div>
<div id="ad-space">— AD SPACE —</div>
<div id="share-toast">클립보드에 복사됨!</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/*
 * 고라니 런 - GORANI RUN v4
 *
 * 화면 구성:
 *   카메라: 위에서 비스듬히 내려다봄 (전전 버전과 동일)
 *   고라니: 화면 아래쪽에 고정, 얼굴이 카메라를 향함 (앞모습 보임)
 *   차: 화면 위(멀리)에서 스폰 → 고라니를 향해 아래로 쓩쓩
 *   도로: 천천히 위→아래로 스크롤 (고라니가 달리는 느낌)
 *
 * 좌표:
 *   카메라는 +Z쪽, 위에서 -Z 방향을 내려다봄
 *   고라니는 +Z 근처(화면 아래), 얼굴은 +Z(카메라 쪽)
 *   차는 -Z(멀리=화면 위)에서 스폰, +Z(카메라=화면 아래)로 이동
 *   도로도 +Z로 천천히 스크롤
 */

var scene, camera, renderer;
var gorani;
var obstacles = [];
var roadLines = [];
var roadPosts = [];
var decorations = [];
var particles = [];
var coins = [];
var gameState = 'menu';
var score = 0, bestScore = 0;
var speed = 0.25, maxSpeed = 0.65;
var playerX = 0, targetX = 0;
var lives = 3, combo = 0, comboTimer = 0;
var invincible = false, invincibleTimer = 0;
var frameCount = 0;
var gyroAvailable = false, gyroGamma = 0;
var difficultyTimer = 0, obstacleFrequency = 60;
var distance = 0, runCycle = 0, warningTimer = 0;
var isJumping = false, jumpVelocity = 0, jumpY = 0;
var lastTapTime = 0;

// ─── FEVER SYSTEM ───
var feverGauge = 0, feverMax = 5; // 콤보 5회로 피버 발동
var isFever = false, feverTimer = 0, feverDuration = 480; // 8초 (60fps * 8)
var feverFlash = 0;

// ─── POWERUP SYSTEM ───
var powerups = [];
var hasShield = false, shieldTimer = 0;
var hasMagnet = false, magnetTimer = 0;
var hasSlow = false, slowTimer = 0;

var C = {
  road: 0x2a2a38, roadLine: 0xeecc44, grass1: 0x2d7a3e,
  sky: 0x0c1520, goraniBody: 0xc4956a, goraniLight: 0xd4a878,
  goraniBelly: 0xe0c8a8, goraniFang: 0xf0f0f0,
  obstacle: [0xcc2233, 0x2244cc, 0xeeeeee, 0x333333, 0xdd8800, 0x44aa44],
  headlight: 0xffffaa, taillight: 0xff2200,
  tree: 0x1a6632, trunk: 0x5c3a1e, mountain: 0x2a3a4a,
  coin: 0xffdd00, bush: 0x2a7030
};

// ─── ENVIRONMENT CYCLE SYSTEM ───
// 거리 기반으로 환경이 변함: 밤 → 새벽 → 낮 → 석양 → 밤 (반복)
var envPhase = 0; // 0=밤, 1=새벽, 2=낮, 3=석양
var envTransition = 0; // 0~1 전환 진행도
var envPhaseDistance = 0; // 현재 페이즈에서의 거리
var ENV_PHASE_LENGTH = 300; // 각 환경 300m 지속
var ENV_TRANSITION_LENGTH = 80; // 전환에 80m
var envThemes = [
  { sky: new THREE.Color(0x0c1520), fog: new THREE.Color(0x0c1520), grass: new THREE.Color(0x2d7a3e), road: new THREE.Color(0x2a2a38), ambient: 0.5, dirLight: 0.6, name: '밤' },
  { sky: new THREE.Color(0x2a1a3a), fog: new THREE.Color(0x3a2a4a), grass: new THREE.Color(0x3a6a40), road: new THREE.Color(0x35304a), ambient: 0.6, dirLight: 0.7, name: '새벽' },
  { sky: new THREE.Color(0x5588cc), fog: new THREE.Color(0x6699dd), grass: new THREE.Color(0x44aa55), road: new THREE.Color(0x555566), ambient: 0.8, dirLight: 1.0, name: '낮' },
  { sky: new THREE.Color(0x883322), fog: new THREE.Color(0x994433), grass: new THREE.Color(0x557733), road: new THREE.Color(0x443340), ambient: 0.6, dirLight: 0.8, name: '석양' }
];

// ─── BOSS TRUCK SYSTEM ───
var bossActive = false;
var bossTruck = null;
var bossHP = 0, bossMaxHP = 0;
var bossWarningTimer = 0;
var bossPhase = 0; // 보스 행동 패턴
var bossNextSpawnDist = 500; // 첫 보스 출현 거리
var bossMoveTimer = 0;
var bossLane = 0; // 현재 보스 레인 (-1, 0, 1)
var bossTargetLane = 0;
var bossDefeated = 0; // 처치한 보스 수

// ─── SKIN / ACCESSORY SYSTEM ───
var totalCoins = 0; // 누적 코인 (게임 간 저장)
var equippedSkin = 'none';
var unlockedSkins = ['none'];

// ─── SOUND SYSTEM (Web Audio API) ───
var audioCtx = null;
var soundEnabled = true;
var bgmGain = null;
var bgmStarted = false;

function initAudio() {
  if (audioCtx) {
    // 이미 있으면 resume만 (iOS 필수)
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    return;
  }
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // iOS에서 suspended 상태일 수 있으므로 즉시 resume
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    bgmGain = audioCtx.createGain();
    bgmGain.gain.value = 0.25;
    bgmGain.connect(audioCtx.destination);
  } catch(e) { console.log('Audio not supported'); }
}

function playTone(freq, duration, type, vol, detune) {
  if (!audioCtx || !soundEnabled) return;
  try {
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = type || 'square';
    osc.frequency.value = freq;
    if (detune) osc.detune.value = detune;
    gain.gain.value = vol || 0.1;
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

function playNoise(duration, vol) {
  if (!audioCtx || !soundEnabled) return;
  try {
    var bufSize = audioCtx.sampleRate * duration;
    var buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    var data = buf.getChannelData(0);
    for (var i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
    var src = audioCtx.createBufferSource();
    src.buffer = buf;
    var gain = audioCtx.createGain();
    gain.gain.value = vol || 0.08;
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    var filter = audioCtx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 800;
    src.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    src.start();
  } catch(e) {}
}

// 배경음악 - 간단한 루프 멜로디
var bgmInterval = null;
function startBGM() {
  if (bgmStarted || !audioCtx || !soundEnabled) return;
  bgmStarted = true;
  var notes = [262, 294, 330, 349, 392, 349, 330, 294]; // C D E F G F E D
  var bassNotes = [131, 131, 165, 165, 196, 196, 165, 165];
  var step = 0;
  bgmInterval = setInterval(function() {
    if (!soundEnabled || gameState !== 'playing') return;
    try {
      // Melody
      var osc = audioCtx.createOscillator();
      var g = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = notes[step % notes.length];
      g.gain.value = 0.12;
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
      osc.connect(g); g.connect(bgmGain);
      osc.start(); osc.stop(audioCtx.currentTime + 0.2);

      // Bass
      var osc2 = audioCtx.createOscillator();
      var g2 = audioCtx.createGain();
      osc2.type = 'sine';
      osc2.frequency.value = bassNotes[step % bassNotes.length];
      g2.gain.value = 0.15;
      g2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
      osc2.connect(g2); g2.connect(bgmGain);
      osc2.start(); osc2.stop(audioCtx.currentTime + 0.25);

      step++;
    } catch(e) {}
  }, 250);
}

function stopBGM() {
  bgmStarted = false;
  if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
}

// ─── SKIN SYSTEM FUNCTIONS ───
function loadSkinData() {
  try {
    totalCoins = parseInt(localStorage.getItem('gorani_coins') || '0');
    equippedSkin = localStorage.getItem('gorani_skin') || 'none';
    unlockedSkins = JSON.parse(localStorage.getItem('gorani_unlocked') || '["none"]');
    var savedStats = localStorage.getItem('gorani_stats');
    if (savedStats) stats = JSON.parse(savedStats);
  } catch(e) {}
  updateCoinDisplay();
}

function saveSkinData() {
  try {
    localStorage.setItem('gorani_coins', totalCoins.toString());
    localStorage.setItem('gorani_skin', equippedSkin);
    localStorage.setItem('gorani_unlocked', JSON.stringify(unlockedSkins));
    localStorage.setItem('gorani_stats', JSON.stringify(stats));
  } catch(e) {}
}

function updateCoinDisplay() {
  var cd = document.getElementById('coin-display');
  if (cd) cd.textContent = 'COIN: ' + totalCoins;
  var sc = document.getElementById('shop-coins');
  if (sc) sc.textContent = 'COIN: ' + totalCoins;
}

function addCoins(n) {
  totalCoins += n;
  saveSkinData();
  updateCoinDisplay();
}

function checkAchievementUnlocks() {
  var newUnlock = false;
  SKINS.forEach(function(skin) {
    if (skin.type === 'achievement' && skin.unlock && unlockedSkins.indexOf(skin.id) === -1) {
      if (skin.unlock()) {
        unlockedSkins.push(skin.id);
        newUnlock = true;
        // 알림
        var ce = document.getElementById('combo-display');
        if (ce && gameState === 'playing') {
          ce.textContent = '🎉 스킨 해제: ' + skin.name + '!';
          ce.style.color = '#88ff88'; ce.style.opacity = '1'; comboTimer = 180;
        }
      }
    }
  });
  if (newUnlock) saveSkinData();
}

function openSkinShop() {
  document.getElementById('skin-shop').style.display = 'flex';
  skinShopSelected = equippedSkin;
  checkAchievementUnlocks();
  renderSkinGrid();
  updateCoinDisplay();
}

function closeSkinShop() {
  document.getElementById('skin-shop').style.display = 'none';
}

function renderSkinGrid() {
  var grid = document.getElementById('skin-grid');
  grid.innerHTML = '';
  SKINS.forEach(function(skin) {
    var owned = unlockedSkins.indexOf(skin.id) !== -1;
    var selected = skinShopSelected === skin.id;
    var card = document.createElement('div');
    card.className = 'skin-card' + (selected ? ' selected' : '') + (!owned ? ' locked' : '');

    // 미니 캔버스로 프리뷰
    var cvs = document.createElement('canvas');
    cvs.className = 'skin-preview';
    cvs.width = 128; cvs.height = 128;
    card.appendChild(cvs);

    var nameDiv = document.createElement('div');
    nameDiv.className = 'skin-name';
    nameDiv.textContent = skin.name;
    card.appendChild(nameDiv);

    var costDiv = document.createElement('div');
    if (owned) {
      costDiv.className = 'skin-cost owned';
      costDiv.textContent = skin.id === equippedSkin ? '장착 중' : '보유';
    } else if (skin.type === 'coin') {
      costDiv.className = 'skin-cost';
      costDiv.textContent = skin.cost + ' COIN';
    } else if (skin.type === 'achievement') {
      costDiv.className = 'skin-cost achievement';
      costDiv.textContent = '🔒';
      var info = document.createElement('div');
      info.className = 'unlock-info';
      info.textContent = skin.unlockText || '';
      card.appendChild(info);
    }
    card.appendChild(costDiv);

    card.addEventListener('click', function() {
      handleSkinCardClick(skin);
    });

    grid.appendChild(card);

    // 프리뷰 렌더링 (Three.js 미니씬)
    setTimeout(function() { renderSkinPreview(cvs, skin.id, owned); }, 50);
  });
}

function handleSkinCardClick(skin) {
  var owned = unlockedSkins.indexOf(skin.id) !== -1;
  if (owned) {
    skinShopSelected = skin.id;
    renderSkinGrid();
  } else if (skin.type === 'coin' && totalCoins >= skin.cost) {
    // 구매
    totalCoins -= skin.cost;
    unlockedSkins.push(skin.id);
    skinShopSelected = skin.id;
    saveSkinData();
    updateCoinDisplay();
    sfxCoin();
    renderSkinGrid();
  } else if (skin.type === 'coin') {
    // 코인 부족
    showToast('코인이 부족해요! (' + skin.cost + ' 필요)');
  } else if (skin.type === 'achievement') {
    showToast(skin.unlockText + ' 달성 시 해제!');
  }
}

function equipSelectedSkin() {
  if (unlockedSkins.indexOf(skinShopSelected) !== -1) {
    equippedSkin = skinShopSelected;
    saveSkinData();
    applyAccessory();
    renderSkinGrid();
    sfxPowerup();
    closeSkinShop();
  }
}

function renderSkinPreview(canvas, skinId, owned) {
  try {
    var w = canvas.width, h = canvas.height;
    var ms = new THREE.Scene();
    ms.background = null;
    ms.add(new THREE.AmbientLight(0x889aaa, 0.6));
    var dl = new THREE.DirectionalLight(0xffeedd, 0.8);
    dl.position.set(2, 4, 5); ms.add(dl);

    var model = buildSnapshotGorani(false);
    model.rotation.y = Math.PI;
    // 악세서리 추가
    var headGroup = null;
    model.traverse(function(child) {
      if (child.isGroup && child.position.y > 1.5) headGroup = child;
    });
    if (headGroup) addAccessoryToHead(headGroup, skinId);
    ms.add(model);

    var mc = new THREE.PerspectiveCamera(35, w/h, 0.1, 20);
    mc.position.set(0, 1.7, 2.5);
    mc.lookAt(0, 1.55, 0);

    var mr = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    mr.setSize(w, h);
    mr.setClearColor(0x000000, 0);
    mr.render(ms, mc);

    var ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, w, h);
    if (!owned) ctx.globalAlpha = 0.4;
    ctx.drawImage(mr.domElement, 0, 0, w, h);
    ctx.globalAlpha = 1;
    mr.dispose();
  } catch(e) {}
}

      var nband = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.1, 0.55), new THREE.MeshLambertMaterial({ color: 0x222222 }));
      nband.position.set(0, 0.2, -0.08); headGroup.add(nband);
      // 뒤로 날리는 끈
      var ntail1 = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 0.35), new THREE.MeshLambertMaterial({ color: 0x222222 }));
      ntail1.position.set(0.15, 0.2, 0.35); ntail1.rotation.x = -0.2; ntail1.rotation.y = 0.15; headGroup.add(ntail1);
      var ntail2 = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 0.3), new THREE.MeshLambertMaterial({ color: 0x333333 }));
      ntail2.position.set(0.1, 0.22, 0.3); ntail2.rotation.x = -0.3; ntail2.rotation.y = -0.1; headGroup.add(ntail2);
      break;
  }
}

function applyAccessory() {
  if (!gorani || !gorani.userData.head) return;
  // 기존 악세서리 제거
  var head = gorani.userData.head;
  var toRemove = [];
  head.children.forEach(function(child) {
    if (child.userData && child.userData.isAccessory) toRemove.push(child);
  });
  toRemove.forEach(function(c) { head.remove(c); });

  if (equippedSkin === 'none') return;

  // 래퍼 그룹으로 악세서리 추가 (제거 쉽게)
  var accGroup = new THREE.Group();
  accGroup.userData.isAccessory = true;
  addAccessoryToHead(accGroup, equippedSkin);
  // accGroup의 자식들을 head에 직접 추가하는 대신 그룹 자체를 추가
  head.add(accGroup);
}

function animateGorani() {
  if (gameState !== 'playing') {
    runCycle += 0.02;
    if (gorani.userData.head) gorani.userData.head.rotation.x = Math.sin(runCycle * 0.7) * 0.05;
    if (gorani.userData.tail) gorani.userData.tail.rotation.x = Math.sin(runCycle * 2) * 0.15;
    return;
  }
  runCycle += speed * 2.5;
  gorani.userData.legFL.rotation.x = Math.sin(runCycle) * 0.6;
  gorani.userData.legFR.rotation.x = Math.sin(runCycle + Math.PI) * 0.6;
  gorani.userData.legBL.rotation.x = Math.sin(runCycle + Math.PI * 0.5) * 0.5;
  gorani.userData.legBR.rotation.x = Math.sin(runCycle + Math.PI * 1.5) * 0.5;

  // 점프 물리
  if (isJumping) {
    jumpY += jumpVelocity;
    jumpVelocity -= 0.018;
    if (jumpY <= 0) { jumpY = 0; isJumping = false; jumpVelocity = 0; }
    gorani.position.y = jumpY;
    // 점프 중 다리 오므리기
    gorani.userData.legFL.rotation.x = -0.5;
    gorani.userData.legFR.rotation.x = -0.5;
    gorani.userData.legBL.rotation.x = 0.5;
    gorani.userData.legBR.rotation.x = 0.5;
  } else {
    gorani.position.y = Math.abs(Math.sin(runCycle * 1.2)) * 0.15;
  }
  gorani.userData.head.rotation.x = Math.sin(runCycle * 1.2) * 0.06;
  gorani.userData.head.position.y = 1.65 + Math.sin(runCycle * 1.2) * 0.03;
  gorani.userData.tail.rotation.x = Math.sin(runCycle * 3) * 0.2;
  gorani.userData.tail.rotation.y = Math.sin(runCycle * 2) * 0.15;
  var tilt = (targetX - playerX) * 0.15;
  gorani.rotation.z += (tilt - gorani.rotation.z) * 0.1;
  if (invincible) gorani.visible = Math.floor(invincibleTimer / 3) % 2 === 0;
  // 그림자 따라가기
  if (gorani.userData.shadow) {
    gorani.userData.shadow.position.x = gorani.position.x;
    var sc = Math.max(0.5, 1.0 - jumpY * 0.3);
    gorani.userData.shadow.scale.set(sc, sc, 1);
    gorani.userData.shadow.material.opacity = Math.max(0.05, 0.18 - jumpY * 0.06);
  }
}

// ─── ROAD (도로 라인이 +Z로 스크롤 = 화면에서 위→아래) ───
function createRoad() {
  var rs = new THREE.Mesh(new THREE.PlaneGeometry(11, 400), new THREE.MeshLambertMaterial({ color: C.road }));
  rs.rotation.x = -Math.PI / 2; rs.position.set(0, -0.01, -100); scene.add(rs);

  var SP = 5, CT = 50, TOTAL = CT * SP;
  for (var i = 0; i < CT; i++) {
    var d = new THREE.Mesh(new THREE.PlaneGeometry(0.14, 2.5), new THREE.MeshBasicMaterial({ color: C.roadLine }));
    d.rotation.x = -Math.PI / 2; d.position.set(0, 0.02, -i * SP);
    d.userData.totalLen = TOTAL; scene.add(d); roadLines.push(d);
  }
  [-3.5, 3.5].forEach(function(x) {
    for (var i = 0; i < CT; i++) {
      var dd = new THREE.Mesh(new THREE.PlaneGeometry(0.08, 2), new THREE.MeshBasicMaterial({ color: 0x555566 }));
      dd.rotation.x = -Math.PI / 2; dd.position.set(x, 0.02, -i * SP + 2.5);
      dd.userData.totalLen = TOTAL; scene.add(dd); roadLines.push(dd);
    }
  });
  var ESP = 3.5, ECT = 70, ETOTAL = ECT * ESP;
  [-5.5, 5.5].forEach(function(x) {
    for (var i = 0; i < ECT; i++) {
      var e = new THREE.Mesh(new THREE.PlaneGeometry(0.2, 2.8), new THREE.MeshBasicMaterial({ color: 0xcccccc }));
      e.rotation.x = -Math.PI / 2; e.position.set(x, 0.02, -i * ESP);
      e.userData.totalLen = ETOTAL; scene.add(e); roadLines.push(e);
    }
  });
  var PSP = 8, PCT = 35, PTOTAL = PCT * PSP;
  [-6.3, 6.3].forEach(function(x) {
    for (var i = 0; i < PCT; i++) {
      var p = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.6, 0.08), new THREE.MeshLambertMaterial({ color: 0x888888 }));
      p.position.set(x, 0.3, -i * PSP); p.userData.totalLen = PTOTAL; scene.add(p); roadPosts.push(p);
      var r = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.09, 0.09), new THREE.MeshBasicMaterial({ color: x < 0 ? 0xff4400 : 0xffaa00 }));
      r.position.set(x, 0.5, -i * PSP); r.userData.totalLen = PTOTAL; scene.add(r); roadPosts.push(r);
    }
  });
  var gr = new THREE.Mesh(new THREE.PlaneGeometry(80, 400), new THREE.MeshLambertMaterial({ color: C.grass1 }));
  gr.rotation.x = -Math.PI / 2; gr.position.y = -0.05; scene.add(gr);
}

function scrollRoad(spd) {
  for (var i = 0; i < roadLines.length; i++) {
    roadLines[i].position.z -= spd;
    if (roadLines[i].position.z < -roadLines[i].userData.totalLen + 15) roadLines[i].position.z += roadLines[i].userData.totalLen;
  }
  for (var i = 0; i < roadPosts.length; i++) {
    roadPosts[i].position.z -= spd;
    if (roadPosts[i].position.z < -roadPosts[i].userData.totalLen + 15) roadPosts[i].position.z += roadPosts[i].userData.totalLen;
  }
}

// ─── VEHICLES ───
// 차는 멀리(-Z = 화면 위)에서 스폰, +Z(화면 아래)로 내려옴
// 차 앞면(헤드라이트)이 +Z를 향해야 함 = 아래로 달려오는 모양
function createVehicle() {
  var group = new THREE.Group();
  var type = Math.random();
  var color = C.obstacle[Math.floor(Math.random() * C.obstacle.length)];
  var vw = 1.6, vl = 3.2;

  if (type < 0.6) {
    // CAR - 앞(+Z) = 헤드라이트 쪽
    var cbody = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.55, 3.0), new THREE.MeshLambertMaterial({ color: color }));
    cbody.position.y = 0.5; group.add(cbody);
    var ccab = new THREE.Mesh(new THREE.BoxGeometry(1.25, 0.4, 1.2), new THREE.MeshLambertMaterial({ color: new THREE.Color(color).multiplyScalar(0.75) }));
    ccab.position.set(0, 0.95, -0.2); group.add(ccab);
    var cws = new THREE.Mesh(new THREE.BoxGeometry(1.15, 0.32, 0.05), new THREE.MeshLambertMaterial({ color: 0x88aacc, transparent: true, opacity: 0.5 }));
    cws.position.set(0, 0.95, 0.42); cws.rotation.x = 0.2; group.add(cws);
    var crw = new THREE.Mesh(new THREE.BoxGeometry(1.05, 0.28, 0.05), new THREE.MeshLambertMaterial({ color: 0x88aacc, transparent: true, opacity: 0.4 }));
    crw.position.set(0, 0.92, -0.82); crw.rotation.x = -0.2; group.add(crw);
    var hood = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.15, 0.8), new THREE.MeshLambertMaterial({ color: new THREE.Color(color).multiplyScalar(0.9) }));
    hood.position.set(0, 0.68, 1.0); group.add(hood);
    vw = 1.6; vl = 3.2;
  } else if (type < 0.85) {
    // TRUCK
    var tcargo = new THREE.Mesh(new THREE.BoxGeometry(1.7, 1.2, 3.0), new THREE.MeshLambertMaterial({ color: color }));
    tcargo.position.set(0, 0.9, -0.5); group.add(tcargo);
    var tcab = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.9, 1.6), new THREE.MeshLambertMaterial({ color: new THREE.Color(color).multiplyScalar(0.7) }));
    tcab.position.set(0, 0.75, 1.5); group.add(tcab);
    var tws = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.65, 0.05), new THREE.MeshLambertMaterial({ color: 0x88aacc, transparent: true, opacity: 0.45 }));
    tws.position.set(0, 0.9, 2.32); group.add(tws);
    vw = 1.8; vl = 4.5;
  } else {
    // MOTORCYCLE
    var mbody = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.6, 1.8), new THREE.MeshLambertMaterial({ color: color }));
    mbody.position.y = 0.5; group.add(mbody);
    var mrider = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.6, 0.5), new THREE.MeshLambertMaterial({ color: 0x222222 }));
    mrider.position.set(0, 1.0, -0.2); group.add(mrider);
    var mhelmet = new THREE.Mesh(new THREE.SphereGeometry(0.18, 5, 4), new THREE.MeshLambertMaterial({ color: 0x111111 }));
    mhelmet.position.set(0, 1.45, -0.2); group.add(mhelmet);
    vw = 0.8; vl = 2.0;
  }
  group.userData.width = vw;
  group.userData.length = vl;

  // Wheels
  var wg = new THREE.CylinderGeometry(0.22,0.22,0.12,6), wm = new THREE.MeshLambertMaterial({ color: 0x111111 });
  var hw = vw*0.45, hl = vl*0.28;
  [[-hw,0.22,hl],[hw,0.22,hl],[-hw,0.22,-hl],[hw,0.22,-hl]].forEach(function(p) {
    var w = new THREE.Mesh(wg, wm); w.position.set(p[0],p[1],p[2]); w.rotation.z = Math.PI/2; group.add(w);
  });

  // 헤드라이트 (+Z = 앞 = 아래 방향)
  var hlGeo = new THREE.BoxGeometry(0.22, 0.16, 0.06);
  var hlMat = new THREE.MeshBasicMaterial({ color: C.headlight });
  var tlMat = new THREE.MeshBasicMaterial({ color: C.taillight });
  var fz = vl * 0.5, bz = -vl * 0.5, hx = vw * 0.3;

  [[-hx, 0.48, fz], [hx, 0.48, fz]].forEach(function(p) {
    var h = new THREE.Mesh(hlGeo, hlMat); h.position.set(p[0],p[1],p[2]); group.add(h);
  });
  [[-hx, 0.48, bz], [hx, 0.48, bz]].forEach(function(p) {
    var t = new THREE.Mesh(hlGeo, tlMat); t.position.set(p[0],p[1],p[2]); group.add(t);
  });

  // 헤드라이트 빔 (+Z 방향으로)
  var beamGeo = new THREE.ConeGeometry(0.9, 6, 6);
  var beamMat = new THREE.MeshBasicMaterial({ color: 0xffffdd, transparent: true, opacity: 0.04 });
  [[-hx, 0.48, fz+3], [hx, 0.48, fz+3]].forEach(function(p) {
    var b = new THREE.Mesh(beamGeo, beamMat); b.position.set(p[0],p[1],p[2]);
    b.rotation.x = -Math.PI/2; group.add(b);
  });

function startFeverBGM() {
  if (!audioCtx || !soundEnabled) return;
  bgmStarted = true;
  var notes = [523, 659, 784, 880, 1047, 880, 784, 659];
  var bassNotes = [262, 262, 330, 330, 392, 392, 330, 330];
  var step = 0;
  bgmInterval = setInterval(function() {
    if (!soundEnabled || gameState !== 'playing') return;
    try {
      var osc = audioCtx.createOscillator();
      var g = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.value = notes[step % notes.length];
      g.gain.value = 0.14;
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
      osc.connect(g); g.connect(bgmGain);
      osc.start(); osc.stop(audioCtx.currentTime + 0.12);
      var osc2 = audioCtx.createOscillator();
      var g2 = audioCtx.createGain();
      osc2.type = 'sine';
      osc2.frequency.value = bassNotes[step % bassNotes.length];
      g2.gain.value = 0.18;
      g2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
      osc2.connect(g2); g2.connect(bgmGain);
      osc2.start(); osc2.stop(audioCtx.currentTime + 0.15);
      step++;
    } catch(e) {}
  }, 150); // 더 빠르게!
}

// origColor는 게임 시작 시 한 번만 저장
var goraniOrigColorsSaved = false;
function saveGoraniOrigColors() {
  if (goraniOrigColorsSaved || !gorani) return;
  gorani.traverse(function(child) {
    if (child.isMesh && child.material) {
      child.userData.origColor = child.material.color.getHex();
    }
  });
  goraniOrigColorsSaved = true;
}

function setGoraniGlow(on) {
  if (!gorani) return;
  saveGoraniOrigColors();
  gorani.traverse(function(child) {
    if (child.isMesh && child.material && child.userData.origColor !== undefined) {
      if (on) {
        var origC = new THREE.Color(child.userData.origColor);
        var goldC = new THREE.Color(0xffdd44);
        origC.lerp(goldC, 0.4);
        child.material.color.copy(origC);
        if (child.material.emissive) child.material.emissive.set(0x443300);
      }
    }
  });
}

function restoreGoraniColor() {
  if (!gorani) return;
  gorani.traverse(function(child) {
    if (child.isMesh && child.material && child.userData.origColor !== undefined) {
      child.material.color.setHex(child.userData.origColor);
      if (child.material.emissive) child.material.emissive.set(0x000000);
    }
  });
}

// ─── ENVIRONMENT UPDATE ───
function updateEnvironment() {
  envPhaseDistance += speed * 1.5;
  if (envPhaseDistance >= ENV_PHASE_LENGTH) {
    envPhaseDistance = 0;
    envPhase = (envPhase + 1) % 4;
    envTransition = 0;
    // 환경 변화 알림
    sfxEnvChange();
    var en = document.getElementById('env-name');
    en.textContent = envThemes[envPhase].name;
    en.style.opacity = '1';
    setTimeout(function(){ en.style.opacity = '0'; }, 2000);
  }
  // 전환 진행도
  if (envPhaseDistance < ENV_TRANSITION_LENGTH) {
    envTransition = envPhaseDistance / ENV_TRANSITION_LENGTH;
  } else {
    envTransition = 1;
  }
  // 현재 테마와 이전 테마를 보간
  var prevPhase = (envPhase + 3) % 4;
  var cur = envThemes[envPhase];
  var prev = envThemes[prevPhase];
  var t = envTransition;

  var skyC = prev.sky.clone().lerp(cur.sky, t);
  var fogC = prev.fog.clone().lerp(cur.fog, t);

  scene.background = skyC;
  scene.fog.color.copy(fogC);

  // 조명 조절
  scene.children.forEach(function(child) {
    if (child.isAmbientLight) {
      child.intensity = prev.ambient + (cur.ambient - prev.ambient) * t;
    }
    if (child.isDirectionalLight && child.position.y > 10) {
      child.intensity = prev.dirLight + (cur.dirLight - prev.dirLight) * t;
    }
  });
}

function updateBoss() {
  if (!bossActive || !bossTruck) return;

  // 보스 전진 (고라니 쪽으로 천천히)
  if (bossTruck.position.z < -15) {
    bossTruck.position.z += 0.3;
  } else {
    // 보스 행동 패턴
    bossMoveTimer++;

    // 레인 변경 (주기적으로)
    var moveInterval = Math.max(60, 150 - bossDefeated * 20);
    if (bossMoveTimer % moveInterval === 0) {
      // 고라니를 추적
      if (gorani.position.x < -1.5) bossTargetLane = -1;
      else if (gorani.position.x > 1.5) bossTargetLane = 1;
      else bossTargetLane = 0;
      // 가끔 랜덤으로도 움직임
      if (Math.random() < 0.3) bossTargetLane = Math.floor(Math.random() * 3) - 1;
    }

    // 부드러운 레인 이동
    var targetX = bossTargetLane * 2.0;
    bossTruck.position.x += (targetX - bossTruck.position.x) * 0.03;

    // 경고등 깜빡
    if (bossTruck.userData.warningLights) {
      bossTruck.userData.warningLights.forEach(function(wl, idx) {
        wl.material.color.setHex((frameCount + idx * 10) % 20 < 10 ? 0xff4400 : 0xff8800);
      });
    }

    // 보스가 가끔 경적
    if (bossMoveTimer % 180 === 0) sfxBossHorn();

    // 앞으로 살짝 전진/후진 (위협)
    bossTruck.position.z = -15 + Math.sin(bossMoveTimer * 0.02) * 3;

    // 보스와 충돌 체크 (점프로 위에서 밟으면 데미지!)
    var bw = bossTruck.userData.width * 0.5;
    var bl = bossTruck.userData.length * 0.45;
    var dx = Math.abs(gorani.position.x - bossTruck.position.x);
    var dz = Math.abs(gorani.position.z - bossTruck.position.z);

    if (dx < bw && dz < bl) {
      if (isJumping && jumpY > 1.5 && jumpVelocity < 0) {
        // 점프로 밟기! → 보스에게 데미지
        bossHP--;
        sfxBossHit();
        spawnP(bossTruck.position.x, bossTruck.position.z, 0xff4444, 0xffaa00, 30);
        // 밟은 후 반동 점프
        jumpVelocity = 0.22;
        // 보스 흔들림
        bossTruck.position.y = -0.3;
        setTimeout(function(){ if(bossTruck) bossTruck.position.y = 0; }, 200);
        // HP 바 업데이트
        document.getElementById('boss-hp-bar').style.width = Math.floor(bossHP / bossMaxHP * 100) + '%';
        // 점수
        score += 1000;
        var ce = document.getElementById('combo-display');
        ce.textContent = '💥 보스 타격! (' + bossHP + '/' + bossMaxHP + ')';
        ce.style.color = '#ff4444'; ce.style.opacity = '1'; comboTimer = 90;

        if (bossHP <= 0) {
          defeatBoss();
        }
      } else if (jumpY < 1.0 && !invincible) {
        // 피버 중이면 데미지
        if (isFever) {
          bossHP--;
          sfxBossHit();
          spawnP(bossTruck.position.x, bossTruck.position.z, 0xffaa00, 0xffff44, 20);
          document.getElementById('boss-hp-bar').style.width = Math.floor(bossHP / bossMaxHP * 100) + '%';
          score += 1000;
          invincible = true; invincibleTimer = 30;
          if (bossHP <= 0) defeatBoss();
        } else if (hasShield) {
          hasShield = false; shieldTimer = 0;
          document.getElementById('pu-shield').style.opacity = '0';
          sfxCrash();
          invincible = true; invincibleTimer = 60;
        } else {
          // 일반 충돌 = 데미지
          lives--; updateLivesUI();
          sfxCrash();
          spawnP(gorani.position.x, gorani.position.z, 0xff4444, 0xffaa00, 18);
          document.getElementById('flash-overlay').style.opacity = '1';
          setTimeout(function(){document.getElementById('flash-overlay').style.opacity='0';},180);
          if (navigator.vibrate) navigator.vibrate(200);
          if (lives <= 0) { gameOver(); return; }
          invincible = true; invincibleTimer = 120;
        }
      }
    }
  }

  // 보스전 중에도 일반 차량 스폰 (적게)
}

function defeatBoss() {
  sfxBossDefeat();
  bossDefeated++;
  bossActive = false;
  score += 5000 * bossDefeated;

  // 보스 폭발 연출
  for (var i = 0; i < 8; i++) {
    (function(delay) {
      setTimeout(function() {
        if (bossTruck) {
          spawnP(
            bossTruck.position.x + (Math.random()-0.5)*3,
            bossTruck.position.z + (Math.random()-0.5)*4,
            0xff4444, 0xffaa00, 15
          );
          playNoise(0.1, 0.1);
        }
      }, delay * 150);
    })(i);
  }

  // 보스 날려보내기
  setTimeout(function() {
    if (bossTruck) {
      bossTruck.userData.smashed = true;
      bossTruck.userData.smashVy = 0.4;
      bossTruck.userData.smashSpin = 0.08;
      bossTruck.userData.smashVx = 0.2;
    }
  }, 1200);

  // 3초 후 보스 제거
  setTimeout(function() {
    if (bossTruck) { scene.remove(bossTruck); bossTruck = null; }
    document.getElementById('boss-hp-container').style.opacity = '0';
    document.getElementById('boss-hp-label').style.opacity = '0';
  }, 3000);

  // UI
  var ce = document.getElementById('combo-display');
  ce.textContent = '🏆 보스 처치! +' + (5000 * bossDefeated);
  ce.style.color = '#ffdd00'; ce.style.opacity = '1'; comboTimer = 180;

  // 다음 보스 예약
  bossNextSpawnDist = distance + 400 + bossDefeated * 100;

  // 보스 처치 보상: 피버 발동!
  if (!isFever) {
    feverGauge = feverMax;
    startFever();
  }
}

// ─── PARTICLES ───
function spawnP(x, z, c1, c2, n) {
  for (var i = 0; i < n; i++) {
    var p = new THREE.Mesh(new THREE.BoxGeometry(0.12,0.12,0.12), new THREE.MeshBasicMaterial({ color: Math.random()>0.5?c1:c2 }));
    p.position.set(x+(Math.random()-0.5)*0.5, 0.8, z);
    p.userData.vx=(Math.random()-0.5)*0.25; p.userData.vy=Math.random()*0.18+0.08;
    p.userData.vz=(Math.random()-0.5)*0.25; p.userData.life=1;
    scene.add(p); particles.push(p);
  }
}
function updateParticles() {
  for (var i = particles.length-1; i >= 0; i--) {
    var p = particles[i];
    p.position.x+=p.userData.vx; p.position.y+=p.userData.vy; p.position.z+=p.userData.vz;
    p.userData.vy-=0.007; p.userData.life-=0.025;
    p.material.opacity=Math.max(0,p.userData.life); p.material.transparent=true;
    p.rotation.x+=0.12; p.rotation.z+=0.08;
    if(p.userData.life<=0){scene.remove(p);particles.splice(i,1);}
  }
}

// ─── CONTROLS ───
function setupGyroscope() {
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    document.getElementById('start-btn').addEventListener('click', function() {
      DeviceOrientationEvent.requestPermission().then(function(s) {
        if (s === 'granted') { window.addEventListener('deviceorientation', handleGyro); gyroAvailable = true; }
      }).catch(function(e) { console.error(e); });
    }, { once: true });
  } else {
    window.addEventListener('deviceorientation', function(e) { if (e.gamma !== null) { gyroAvailable = true; handleGyro(e); } });
  }
}
function handleGyro(e) { if (e.gamma !== null) gyroGamma = e.gamma; }
var touchX = null;
function setupTouchControls() {
  document.addEventListener('touchstart', function(e) {
    if (gameState !== 'playing') return;
    // 더블탭 감지 (300ms 이내)
    var now = Date.now();
    if (now - lastTapTime < 300) {
      triggerJump();
      lastTapTime = 0;
    } else {
      lastTapTime = now;
    }
    touchX = e.touches[0].clientX;
  }, { passive: true });
  document.addEventListener('touchmove', function(e) {
    if (gameState !== 'playing' || touchX === null) return;
    targetX += (e.touches[0].clientX - touchX) * 0.025;
    targetX = Math.max(-4.5, Math.min(4.5, targetX)); touchX = e.touches[0].clientX;
  }, { passive: true });
  document.addEventListener('touchend', function() { touchX = null; }, { passive: true });
  // 데스크탑: 더블클릭 또는 스페이스바
  document.addEventListener('dblclick', function() {
    if (gameState === 'playing') triggerJump();
  });
  var keys = {};
  document.addEventListener('keydown', function(e) {
    keys[e.key] = true;
    if ((e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w') && gameState === 'playing') triggerJump();
  });
  document.addEventListener('keyup', function(e) { keys[e.key] = false; });
  setInterval(function() {
    if (gameState !== 'playing') return;
    if (keys['ArrowLeft'] || keys['a']) targetX -= 0.15;
    if (keys['ArrowRight'] || keys['d']) targetX += 0.15;
    targetX = Math.max(-4.5, Math.min(4.5, targetX));
  }, 16);
}

function triggerJump() {
  if (isJumping) return;
  isJumping = true;
  jumpVelocity = 0.28;
  jumpY = 0;
  sfxJump();
  stats.totalJumps++;
}

// ─── GAME ───
function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-over-screen').style.display = 'none';
  document.getElementById('ad-space').style.display = 'none';
  document.getElementById('warning-text').style.opacity = '0';
  for (var i = 0; i < obstacles.length; i++) scene.remove(obstacles[i]); obstacles = [];
  for (var i = 0; i < coins.length; i++) scene.remove(coins[i]); coins = [];
  for (var i = 0; i < particles.length; i++) scene.remove(particles[i]); particles = [];
  for (var i = 0; i < powerups.length; i++) scene.remove(powerups[i]); powerups = [];
  score=0; speed=0.25; playerX=0; targetX=0; lives=3; combo=0; comboTimer=0;
  invincible=false; invincibleTimer=0; difficultyTimer=0; obstacleFrequency=60;
  frameCount=0; distance=0; runCycle=0; isJumping=false; jumpY=0; jumpVelocity=0; lastTapTime=0;
  feverGauge=0; isFever=false; feverTimer=0; feverFlash=0;
  hasShield=false; shieldTimer=0; hasMagnet=false; magnetTimer=0; hasSlow=false; slowTimer=0;
  envPhase=0; envTransition=1; envPhaseDistance=ENV_TRANSITION_LENGTH;
  bossActive=false; bossHP=0; bossWarningTimer=0; bossPhase=0; bossMoveTimer=0;
  bossNextSpawnDist=500; bossDefeated=0;
  if(bossTruck){scene.remove(bossTruck);bossTruck=null;}
  document.getElementById('boss-hp-container').style.opacity='0';
  document.getElementById('boss-hp-label').style.opacity='0';
  document.getElementById('boss-warning').style.opacity='0';
  // 환경 초기화 (밤)
  scene.background = new THREE.Color(0x0c1520);
  scene.fog.color.set(0x0c1520);
  document.getElementById('fever-bar').style.width='0%';
  document.getElementById('fever-bar-container').style.opacity='0';
  document.getElementById('fever-overlay').className='';
  document.getElementById('pu-shield').style.opacity='0';
  document.getElementById('pu-magnet').style.opacity='0';
  document.getElementById('pu-slow').style.opacity='0';
  restoreGoraniColor();
  gameState='playing';
  updateLivesUI();
  document.getElementById('score-display').textContent='0';
  document.getElementById('combo-display').style.opacity='0';
  gorani.position.set(0,0,3); gorani.rotation.set(0,Math.PI,0); gorani.visible=true;
  applyAccessory();
  initAudio();
  sfxStart();
  startBGM();
}

function gameOver() {
  gameState = 'gameover';
  if (isFever) { isFever = false; feverTimer = 0; }
  restoreGoraniColor();
  document.getElementById('fever-overlay').className = '';
  document.getElementById('score-display').style.color = '#fff';
  stopBGM();
  sfxGameOver();
  // 업적 통계 업데이트
  stats.totalGames++;
  if (distance > stats.maxDist) stats.maxDist = Math.floor(distance);
  if (combo > stats.maxCombo) stats.maxCombo = combo;
  stats.bossKills += bossDefeated;
  saveSkinData();
  checkAchievementUnlocks();
  document.getElementById('game-over-screen').style.display = 'flex';
  document.getElementById('final-score').textContent = score.toLocaleString();
  document.getElementById('final-distance').textContent = Math.floor(distance) + ' m 생존';
  document.getElementById('ad-space').style.display = 'flex';
  if (score > bestScore) {
    bestScore = score; try{localStorage.setItem('goranirun_best',bestScore.toString());}catch(e){}
    document.getElementById('new-best').style.display = 'block';
    document.getElementById('best-score-text').textContent = 'BEST: ' + bestScore;
  } else { document.getElementById('new-best').style.display = 'none'; }
}

function updateLivesUI() { for (var i=1;i<=3;i++) document.getElementById('life'+i).className = i<=lives?'life-icon':'life-icon lost'; }

function shareScore() {
  var text = '🦌 고라니 런 🦌\n'
    + '점수: ' + score.toLocaleString() + '\n'
    + '거리: ' + Math.floor(distance) + 'm 생존\n'
    + (score >= bestScore ? '🏆 신기록!\n' : '')
    + '나도 도전해봐! 고라니를 살려줘!\n'
    + 'https://yeop96.github.io/gorani_run/';

  // Web Share API 지원하면 네이티브 공유
  if (navigator.share) {
    navigator.share({
      title: '고라니 런 - GORANI RUN',
      text: text,
      url: 'https://yeop96.github.io/gorani_run/'
    }).catch(function() {
      copyToClipboard(text);
    });
  } else {
    copyToClipboard(text);
  }
}

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      showToast('클립보드에 복사됨!');
    }).catch(function() {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); showToast('클립보드에 복사됨!'); }
  catch(e) { showToast('복사 실패 😢'); }
  document.body.removeChild(ta);
}

function showToast(msg) {
  var t = document.getElementById('share-toast');
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(function() { t.style.opacity = '0'; }, 2000);
}

function checkHit(o) {
  var hw=(o.userData.width||1.6)*0.5+0.25, hl=(o.userData.length||3)*0.45;
  return Math.abs(gorani.position.x-o.position.x)<hw && Math.abs(gorani.position.z-o.position.z)<hl;
}
function checkNear(o) {
  var hw=(o.userData.width||1.6)*0.5+0.25, dx=Math.abs(gorani.position.x-o.position.x);
  return dx<hw+1.0 && dx>=hw && Math.abs(gorani.position.z-o.position.z)<2.5;
}

// ─── MAIN LOOP ───
function animate() {
  requestAnimationFrame(animate);
  frameCount++;
  animateGorani();

  if (gameState === 'playing') {
    updateGame();
  } else if (gameState === 'menu') {
    camera.position.x = Math.sin(frameCount * 0.004) * 0.8;
    gorani.position.x = Math.sin(frameCount * 0.006) * 2;
    scrollRoad(0.06);
    for (var i = 0; i < decorations.length; i++) {
      decorations[i].position.z -= 0.06;
      if (decorations[i].position.z < -300) decorations[i].position.z += 300;
    }
  }

  for (var i = 0; i < coins.length; i++) coins[i].rotation.y = frameCount * 0.05;
  for (var i = 0; i < powerups.length; i++) powerups[i].rotation.y = frameCount * 0.06;
  updateParticles();
  renderer.render(scene, camera);
}

function updateGame() {
  if (gyroAvailable) { targetX = (gyroGamma/28)*4.5; targetX = Math.max(-4.5,Math.min(4.5,targetX)); }
  playerX += (targetX - playerX) * 0.12;
  gorani.position.x = playerX;

  difficultyTimer++;
  if (difficultyTimer % 350 === 0) { speed = Math.min(speed+0.015, maxSpeed); if (obstacleFrequency>22) obstacleFrequency-=2; }

  // 피버 중 3배 점수
  var scoreMulti = isFever ? 3 : 1;
  score += Math.floor(speed * 4 * scoreMulti);
  distance += speed * 1.5;
  document.getElementById('score-display').textContent = score.toLocaleString();
  document.getElementById('distance-display').textContent = Math.floor(distance) + ' m';

  // 피버 중 점수 표시 색상 변경
  if (isFever) {
    feverFlash++;
    var hue = (feverFlash * 5) % 360;
    document.getElementById('score-display').style.color = 'hsl(' + hue + ',100%,70%)';
  } else {
    document.getElementById('score-display').style.color = '#fff';
  }

  // 발걸음 소리 - 점프 중엔 안남
  if (frameCount % 12 === 0 && !isJumping) {
    playTone(80 + Math.random() * 30, 0.06, 'triangle', 0.07);
  }

  // 환경 변화 업데이트
  updateEnvironment();

  // 보스 스폰 체크
  if (!bossActive && distance >= bossNextSpawnDist) {
    spawnBoss();
  }
  // 보스 업데이트
  if (bossActive) {
    updateBoss();
    // 보스 날아가는 처리
    if (bossTruck && bossTruck.userData.smashed) {
      bossTruck.position.y += bossTruck.userData.smashVy;
      bossTruck.userData.smashVy -= 0.01;
      bossTruck.rotation.z += bossTruck.userData.smashSpin;
      bossTruck.rotation.x += 0.03;
      bossTruck.position.x += bossTruck.userData.smashVx;
    }
  }

  // 도로 스크롤
  scrollRoad(speed * 0.4);

  // ─── 피버 타이머 ───
  if (isFever) {
    feverTimer--;
    // 피버 게이지를 타이머로 표시
    document.getElementById('fever-bar').style.width = Math.floor(feverTimer / feverDuration * 100) + '%';
    document.getElementById('fever-bar').style.background = 'linear-gradient(90deg,#ff4400,#ffcc00,#ff4400)';
    // 고라니 발광 깜빡임
    if (feverFlash % 6 < 3) setGoraniGlow(true);
    // 피버 중 코인 더 많이 스폰
    if (frameCount % 30 === 0) { var cn = createCoin(); scene.add(cn); coins.push(cn); }
    if (feverTimer <= 0) endFever();
  } else {
    // 피버 게이지 표시
    if (feverGauge > 0) {
      document.getElementById('fever-bar-container').style.opacity = '1';
      document.getElementById('fever-bar').style.width = Math.floor(feverGauge / feverMax * 100) + '%';
      document.getElementById('fever-bar').style.background = 'linear-gradient(90deg,#ff8800,#ffcc00,#ff8800)';
    }
  }

  // ─── 파워업 타이머 ───
  if (hasShield) { shieldTimer--; if (shieldTimer <= 0) { hasShield = false; document.getElementById('pu-shield').style.opacity = '0'; } }
  if (hasMagnet) { magnetTimer--; if (magnetTimer <= 0) { hasMagnet = false; document.getElementById('pu-magnet').style.opacity = '0'; } }
  if (hasSlow) { slowTimer--; if (slowTimer <= 0) { hasSlow = false; document.getElementById('pu-slow').style.opacity = '0'; } }

  // 차 스폰 (보스전에는 덜 나옴)
  var spawnFreq = bossActive ? Math.max(obstacleFrequency * 2, 80) : obstacleFrequency;
  if (frameCount % spawnFreq === 0) {
    var obs = createVehicle(); scene.add(obs); obstacles.push(obs);
    if (Math.random() < 0.35 && speed > 0.35) {
      var obs2 = createVehicle();
      var others = [-3.8,-1.8,0,1.8,3.8].filter(function(l){return Math.abs(l-obs.userData.lane)>1.5;});
      var l2 = others[Math.floor(Math.random()*others.length)];
      obs2.position.x = l2; obs2.userData.lane = l2; obs2.position.z -= 3+Math.random()*5;
      scene.add(obs2); obstacles.push(obs2);
    }
  }

  // 코인 스폰
  if (frameCount % 90 === 0 && Math.random() < 0.5) { var cn = createCoin(); scene.add(cn); coins.push(cn); }

  // 파워업 스폰 (300프레임마다 20% 확률)
  if (frameCount % 300 === 0 && Math.random() < 0.2 && distance > 50) {
    var pu = createPowerup(); scene.add(pu); powerups.push(pu);
  }

  // 차 이동 & 충돌
  var slowMult = hasSlow ? 0.5 : 1.0;
  for (var i = obstacles.length-1; i >= 0; i--) {
    var o = obstacles[i];

    // 날아가는 차 처리 (피버 파괴)
    if (o.userData.smashed) {
      o.position.x += o.userData.smashVx;
      o.position.y += o.userData.smashVy;
      o.userData.smashVy -= 0.015;
      o.rotation.z += o.userData.smashSpin;
      o.rotation.x += 0.05;
      if (o.position.y < -5) { scene.remove(o); obstacles.splice(i, 1); }
      continue;
    }

    o.position.z += o.userData.carSpeed * slowMult;

    // 충돌 체크
    if (jumpY < 1.0 && checkHit(o)) {
      // 피버 중이면 차를 날려버림!
      if (isFever) {
        feverSmashCar(o);
        continue;
      }
      // 실드 있으면 실드 소모
      if (hasShield) {
        hasShield = false; shieldTimer = 0;
        document.getElementById('pu-shield').style.opacity = '0';
        sfxCrash();
        spawnP(o.position.x, o.position.z, 0x3399ff, 0x99ccff, 15);
        var ce = document.getElementById('combo-display');
        ce.textContent = '🛡️ 실드 방어!'; ce.style.color = '#3399ff'; ce.style.opacity = '1'; comboTimer = 90;
        scene.remove(o); obstacles.splice(i, 1);
        continue;
      }
      // 무적 중이면 무시
      if (invincible) continue;
      // 일반 충돌
      lives--; updateLivesUI();
      sfxCrash();
      spawnP(o.position.x, o.position.z, 0xff4444, 0xffaa00, 18);
      combo=0; feverGauge=0;
      document.getElementById('fever-bar').style.width='0%';
      document.getElementById('fever-bar-container').style.opacity='0';
      document.getElementById('combo-display').style.opacity='0';
      document.getElementById('flash-overlay').style.opacity='1';
      setTimeout(function(){document.getElementById('flash-overlay').style.opacity='0';},180);
      var ws=['앗 위험!','조심해!','으악!','아야!'];
      var wt=document.getElementById('warning-text');
      wt.textContent=ws[Math.floor(Math.random()*ws.length)]; wt.style.opacity='1'; warningTimer=60;
      if(navigator.vibrate) navigator.vibrate(120);
      scene.remove(o); obstacles.splice(i,1);
      if(lives<=0){gameOver();return;}
      invincible=true; invincibleTimer=100; continue;
    }

    // 아슬아슬 (near miss) → 피버 게이지 충전
    if (!o.userData.nearMissed && checkNear(o)) {
      o.userData.nearMissed=true; combo++; comboTimer=130;
      sfxNearMiss();
      var bonus=150*combo*scoreMulti;
      if (jumpY >= 1.0) bonus = 300 * combo * scoreMulti;
      score+=bonus;
      spawnP(gorani.position.x, gorani.position.z, isFever ? 0xffaa00 : 0x44ffaa, 0xffff44, 10);
      var ce=document.getElementById('combo-display');
      ce.style.color = '#ffdd44';
      ce.textContent=(jumpY >= 1.0 ? '점프! ' : '아슬아슬! ')+'x'+combo+' +'+bonus; ce.style.opacity='1';

      // 피버 게이지 충전 (피버 중이 아닐 때만)
      if (!isFever) {
        feverGauge = Math.min(feverGauge + 1, feverMax);
        if (feverGauge >= feverMax) {
          startFever();
        }
      }
    }

    if (o.position.z > 15 && !o.userData.smashed) { sfxCarPass(); scene.remove(o); obstacles.splice(i,1); }
  }

  // 코인 이동 & 수집 (자석 효과 포함)
  var magnetRange = (hasMagnet || isFever) ? 4.0 : 1.0;
  for (var i = coins.length-1; i >= 0; i--) {
    var c = coins[i];
    c.position.z += speed * 0.6;
    c.position.y = 1.0 + Math.sin(frameCount*0.06+i)*0.2;

    // 자석/피버: 코인이 고라니에게 빨려옴
    if (hasMagnet || isFever) {
      var dx = gorani.position.x - c.position.x;
      var dz = gorani.position.z - c.position.z;
      var dist = Math.sqrt(dx*dx + dz*dz);
      if (dist < magnetRange && dist > 0.1) {
        c.position.x += dx * 0.15;
        c.position.z += dz * 0.15;
      }
    }

    if (Math.abs(gorani.position.x-c.position.x)<magnetRange && Math.abs(gorani.position.z-c.position.z)<(hasMagnet||isFever?2.5:1.5)) {
      var coinScore = 200 * scoreMulti;
      score+=coinScore; addCoins(1); sfxCoin(); spawnP(c.position.x,c.position.z,0xffdd00,0xffff88,8);
      scene.remove(c); coins.splice(i,1); continue;
    }
    if (c.position.z > 15) { scene.remove(c); coins.splice(i,1); }
  }

  // 파워업 이동 & 수집
  for (var i = powerups.length-1; i >= 0; i--) {
    var pu = powerups[i];
    pu.position.z += speed * 0.6;
    pu.position.y = 1.2 + Math.sin(frameCount * 0.08 + i) * 0.3;
    pu.rotation.y = frameCount * 0.06;
    if (pu.userData.glow) { pu.userData.glow.scale.setScalar(1.0 + Math.sin(frameCount * 0.1) * 0.2); }

    if (Math.abs(gorani.position.x - pu.position.x) < 1.2 && Math.abs(gorani.position.z - pu.position.z) < 1.5) {
      sfxPowerup();
      spawnP(pu.position.x, pu.position.z, 0xffffff, 0x88ddff, 12);
      var puType = pu.userData.type;
      if (puType === 'shield') {
        hasShield = true; shieldTimer = 600; // 10초
        document.getElementById('pu-shield').style.opacity = '1';
        var ce = document.getElementById('combo-display');
        ce.textContent = '🛡️ 실드 획득!'; ce.style.color = '#3399ff'; ce.style.opacity = '1'; comboTimer = 90;
      } else if (puType === 'magnet') {
        hasMagnet = true; magnetTimer = 600; // 10초
        document.getElementById('pu-magnet').style.opacity = '1';
        var ce = document.getElementById('combo-display');
        ce.textContent = '🧲 자석 획득!'; ce.style.color = '#dd44dd'; ce.style.opacity = '1'; comboTimer = 90;
      } else if (puType === 'slow') {
        hasSlow = true; slowTimer = 300; // 5초
        document.getElementById('pu-slow').style.opacity = '1';
        var ce = document.getElementById('combo-display');
        ce.textContent = '🐌 슬로우!'; ce.style.color = '#44ddaa'; ce.style.opacity = '1'; comboTimer = 90;
      }
      scene.remove(pu); powerups.splice(i, 1); continue;
    }
    if (pu.position.z > 15) { scene.remove(pu); powerups.splice(i, 1); }
  }

  if (comboTimer>0){comboTimer--;if(comboTimer<=0){combo=0;document.getElementById('combo-display').style.opacity='0';}}
  if (warningTimer>0){warningTimer--;if(warningTimer<=0) document.getElementById('warning-text').style.opacity='0';}
  if (invincible){invincibleTimer--;if(invincibleTimer<=0){invincible=false;gorani.visible=true;}}

  // 배경도 도로와 같은 속도로 스크롤
  for (var i = 0; i < decorations.length; i++) {
    decorations[i].position.z -= speed * 0.4;
    if (decorations[i].position.z < -300) decorations[i].position.z += 300;
  }

  camera.position.x += (playerX * 0.3 - camera.position.x) * 0.06;
  camera.position.y = 5.5 + Math.sin(frameCount * 0.015) * 0.08;
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ─── 3D GORANI SNAPSHOT RENDERER ───
// 별도 미니 씬에 고라니를 복제해서 원하는 앵글로 찍어서 캔버스에 복사

  belly.position.set(0, 0.78, 0); g.add(belly);

  var hg = new THREE.Group(); hg.position.set(0, 1.65, -0.7);
  hg.add(new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.6, 0.7), bm));
  var sn = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.3, 0.35), new THREE.MeshLambertMaterial({ color: C.goraniLight }));
  sn.position.set(0, -0.1, -0.4); hg.add(sn);
  var ns = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.1, 0.05), new THREE.MeshLambertMaterial({ color: 0x222222 }));
  ns.position.set(0, 0, -0.58); hg.add(ns);

  if (isDead) {
    // X 눈 (네모 조합)
    [-0.2, 0.2].forEach(function(x) {
      // X자를 두 개의 얇은 직사각형 교차로
      var m1 = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.04, 0.04), new THREE.MeshBasicMaterial({ color: 0x666688 }));
      m1.position.set(x, 0.1, -0.36); m1.rotation.z = 0.7; hg.add(m1);
      var m2 = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.04, 0.04), new THREE.MeshBasicMaterial({ color: 0x666688 }));
      m2.position.set(x, 0.1, -0.36); m2.rotation.z = -0.7; hg.add(m2);
    });
    // 찡그린 입
    var mouth = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.04, 0.04), new THREE.MeshBasicMaterial({ color: 0x886655 }));
    mouth.position.set(0, -0.18, -0.5); mouth.rotation.z = 0.15; hg.add(mouth);
  } else {
    // 일반 눈
    [-0.2, 0.2].forEach(function(x) {
      var ew = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.2, 0.04), new THREE.MeshBasicMaterial({ color: 0xffffff }));
      ew.position.set(x, 0.1, -0.33); hg.add(ew);
      var ey = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.16, 0.05), new THREE.MeshBasicMaterial({ color: 0x111111 }));
      ey.position.set(x, 0.08, -0.35); hg.add(ey);
      var sh = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 0.02), new THREE.MeshBasicMaterial({ color: 0xffffff }));
      sh.position.set(x + 0.03, 0.13, -0.37); hg.add(sh);
    });
  }

  // 귀
  [[-0.22, 0.42, 0, -0.2], [0.22, 0.42, 0, 0.2]].forEach(function(d) {
    var ear = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.35, 4), bm);
    ear.position.set(d[0], d[1], d[2]); ear.rotation.z = d[3]; hg.add(ear);
    var ei = new THREE.Mesh(new THREE.ConeGeometry(0.07, 0.2, 4), new THREE.MeshLambertMaterial({ color: 0xdda488 }));
    ei.position.set(d[0], d[1] - 0.02, d[2] - 0.02); ei.rotation.z = d[3]; hg.add(ei);
  });
  // 엄니
  [-0.1, 0.1].forEach(function(x) {
    var f = new THREE.Mesh(new THREE.ConeGeometry(0.03, 0.2, 4), new THREE.MeshBasicMaterial({ color: 0xf0f0f0 }));
    f.position.set(x, -0.25, -0.4); f.rotation.x = Math.PI; hg.add(f);
  });
  g.add(hg);

  // 다리
  [{ x: -0.32, z: -0.5 }, { x: 0.32, z: -0.5 }, { x: -0.32, z: 0.5 }, { x: 0.32, z: 0.5 }].forEach(function(d) {
    var lg = new THREE.Group(); lg.position.set(d.x, 0.65, d.z);
    lg.add(new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.65, 0.22), bm));
    var hoof = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.12, 0.24), new THREE.MeshLambertMaterial({ color: 0x3a2a1a }));
    hoof.position.y = -0.38; lg.add(hoof);
    g.add(lg);
  });
  // 꼬리
  var tail = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.18, 0.25), new THREE.MeshLambertMaterial({ color: C.goraniBelly }));
  tail.position.set(0, 1.35, 0.9); g.add(tail);

  return g;
}

function renderGorani3D(targetCanvas, viewType) {
  // viewType: 'front-full' (전신 정면), 'front-face' (얼굴만), 'dead' (죽은 표정)
  var w = targetCanvas.width;
  var h = targetCanvas.height;

  var miniScene = new THREE.Scene();
  miniScene.background = null; // 투명

  miniScene.add(new THREE.AmbientLight(0x889aaa, 0.6));
  var dl = new THREE.DirectionalLight(0xffeedd, 0.8);
  dl.position.set(2, 4, 5); miniScene.add(dl);
  var bl = new THREE.DirectionalLight(0xaabbdd, 0.3);
  bl.position.set(-2, 2, -3); miniScene.add(bl);

  var isDead = (viewType === 'dead');
  var model = buildSnapshotGorani(isDead);

  if (isDead) {
    // 살짝 기울어진 포즈
    model.rotation.z = 0.15;
    model.rotation.x = 0.05;
  }

  miniScene.add(model);

  var miniCam = new THREE.PerspectiveCamera(35, w / h, 0.1, 20);

  if (viewType === 'front-face') {
    // 얼굴만 클로즈업
    model.rotation.y = Math.PI; // 얼굴이 카메라를 향하게
    miniCam.position.set(0, 1.7, 2.5);
    miniCam.lookAt(0, 1.55, 0);
  } else {
    // 전신 (front-full 또는 dead)
    model.rotation.y = Math.PI;
    miniCam.position.set(0, 1.2, 4.2);
    miniCam.lookAt(0, 0.9, 0);
  }

  var miniRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  miniRenderer.setSize(w, h);
  miniRenderer.setClearColor(0x000000, 0);
  miniRenderer.render(miniScene, miniCam);

  // 캔버스에 복사
  var ctx = targetCanvas.getContext('2d');
  ctx.clearRect(0, 0, w, h);
  ctx.drawImage(miniRenderer.domElement, 0, 0, w, h);

  // 죽은 고라니에 별 이펙트 추가
  if (isDead) {
    ctx.fillStyle = '#ffd700';
    ctx.font = '16px sans-serif';
    ctx.fillText('✦', w * 0.72, h * 0.18);
    ctx.font = '12px sans-serif';
    ctx.fillText('✦', w * 0.12, h * 0.25);
    ctx.fillText('✦', w * 0.78, h * 0.75);
  }

  miniRenderer.dispose();
}

// 스피커 아이콘 (이건 그대로 Canvas 2D)
function drawSpeakerIcon(canvas, on) {
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 36, 36);
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(14, 11); ctx.lineTo(8, 11); ctx.lineTo(8, 25);
  ctx.lineTo(14, 25); ctx.lineTo(20, 29); ctx.lineTo(20, 7); ctx.closePath();
  ctx.fill();
  if (on) {
    ctx.beginPath(); ctx.arc(20, 18, 5, -0.7, 0.7); ctx.stroke();
    ctx.beginPath(); ctx.arc(20, 18, 9, -0.6, 0.6); ctx.stroke();
  } else {
    ctx.strokeStyle = '#ff6666'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(24, 13); ctx.lineTo(32, 23); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(32, 13); ctx.lineTo(24, 23); ctx.stroke();
  }
}

// 트로피 (Canvas 2D)
function drawTrophy(canvas) {
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 32, 32);
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.moveTo(6, 6); ctx.lineTo(26, 6); ctx.lineTo(23, 18); ctx.lineTo(9, 18); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#fff3b0';
  ctx.beginPath(); ctx.moveTo(10, 8); ctx.lineTo(14, 8); ctx.lineTo(13, 16); ctx.lineTo(11, 16); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#daa520'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(5, 12, 4, -Math.PI*0.5, Math.PI*0.5); ctx.stroke();
  ctx.beginPath(); ctx.arc(27, 12, 4, Math.PI*0.5, -Math.PI*0.5); ctx.stroke();
  ctx.fillStyle = '#daa520'; ctx.fillRect(14, 18, 4, 5);
  ctx.fillStyle = '#b8860b'; ctx.beginPath(); ctx.roundRect(10, 23, 12, 4, 1); ctx.fill();
}

function drawAllArt() {
  // 타이틀: 전신 정면
  renderGorani3D(document.getElementById('title-gorani'), 'front-full');
  // 생명: 얼굴 클로즈업
  ['life1','life2','life3'].forEach(function(id) {
    renderGorani3D(document.getElementById(id), 'front-face');
  });
  // 게임오버: 죽은 표정 전신
  renderGorani3D(document.getElementById('dead-gorani-canvas'), 'dead');
  // 트로피, 스피커
  drawTrophy(document.getElementById('trophy-canvas'));
  drawSoundIcon();
}

function drawSoundIcon() {
  drawSpeakerIcon(document.getElementById('sound-canvas'), soundEnabled);
}

init();
drawAllArt();
</script>
